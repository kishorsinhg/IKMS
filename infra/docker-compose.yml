services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ikms-postgres
    environment:
      POSTGRES_DB: ikms
      POSTGRES_USER: ikms
      POSTGRES_PASSWORD: ikms
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ikms -d ikms"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
