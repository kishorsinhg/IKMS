spring:
  application:
    name: ikms-backend
  datasource:
    url: ${IKMS_DB_URL:jdbc:postgresql://localhost:5432/ikms}
    username: ${IKMS_DB_USERNAME:ikms}
    password: ${IKMS_DB_PASSWORD:ikms}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: ${IKMS_SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

ikms:
  security:
    cors:
      allowed-origins: ${IKMS_CORS_ALLOWED_ORIGINS:http://localhost:5173}
